prefix: "&#54DAF4ɢ&#54CCEDᴀ&#54BEE6ᴛ&#54B1DFᴇ&#54A3D8ᴋ&#5495D2ᴇ&#5487CBᴇ&#547AC4ᴘ&#546CBDᴇ&#545EB6ʀ"

updater: true

bStats:
  enabled: true

database:
  # Database type. Available options: H2 (local), MYSQL
  type: H2

  # === Options for remote databases (ignored when type: H2) ===

  # Database server address
  host: "localhost"

  # Database server port (default for MySQL/MariaDB is 3306)
  port: 3306

  # Name of the database to connect to (must already exist)
  database: "gatekeeper_db"

  # Database credentials
  username: "db_user"
  password: "secure_password"

  # Whether to use SSL (recommended for remote connections)
  useSSL: false
