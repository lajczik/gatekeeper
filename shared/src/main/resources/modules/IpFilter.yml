enabled: true
priority: 5
log: "Connection from %address%/%name% rejected: suspicious IP detected!" # Set empty "" to disable the logger
kick:
  - "%prefix%"
  - ""
  - "&#FF5555An error occurred while connecting to the server!"
  - "&#C7C7C7Your internet provider is blocked, make sure your VPN is turned off."
